name: MiniMax Code Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  minimax:
    if: |
      (github.event_name == 'issue_comment' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))) ||
      (github.event_name == 'pull_request_review_comment' && (contains(github.event.comment.body, '/oc') || contains(github.event.comment.body, '/opencode'))) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '/oc') || contains(github.event.pull_request.body, '/opencode')))
    runs-on: self-hosted-minimax
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configure git identity
        run: |
          git config user.email "minmax-agent@github-actions"
          git config user.name "MiniMax Agent"

      - name: Configure OpenCode with MiniMax provider
        run: |
          mkdir -p ~/.config/opencode
          rm -rf ~/.local/share/opencode
          echo '{"$schema": "https://opencode.ai/config.json", "provider":{"minimax":{"npm": "@ai-sdk/anthropic",  "options": { "baseURL": "https://api.minimax.io/anthropic/v1", "apiKey":"${{ secrets.MINIMAX_API_KEY }}" }, "models": { "MiniMax-M2.7": { "name": "MiniMax-M2.7" } } } } }' > ~/.config/opencode/opencode.json

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          T_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          gh issue comment "$T_NUMBER" --repo "$REPO" --body "MiniMax is starting to work on this..."

      - name: Run OpenCode
        id: run-agent
        uses: anomalyco/opencode/github@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: minimax/MiniMax-M2.7
          use_github_token: true

      - name: Post completion comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          T_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          AGENT_STATUS: ${{ steps.run-agent.outcome }}
        run: |
          if [ "$AGENT_STATUS" = "success" ]; then
            BODY="MiniMax finished successfully ✅"
          else
            BODY="MiniMax finished with errors ❌ — check the [job run](https://github.com/$REPO/actions/runs/${{ github.run_id }}) for details."
          fi
          gh issue comment "$T_NUMBER" --repo "$REPO" --body "$BODY"


      - name: Safety net — commit and push any uncommitted changes
        if: always()
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: commit remaining changes from claude session"
          git push || true
