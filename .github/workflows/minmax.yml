name: MiniMax Code Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]

jobs:
  minmax:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@minmax')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@minmax')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@minmax')) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@minmax') || github.event.pull_request.user.login == 'minmax[bot]'))
    runs-on: self-hosted-minmax
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.email "minmax-agent@github-actions"
          git config user.name "MiniMax Agent"

      - name: Clear Claude state
        run: |
          # Wipe the config, logs, and plugins to prevent "context leakage"
          rm -rf ~/.claude/*
          mkdir -p ~/.claude
        continue-on-error: true

      - name: Ensure log directory exists
        run: mkdir -p ~/.claude/logs && touch ~/.claude/logs/.keep

      - name: Configure Claude Code for MiniMax
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.claude
          python3 - << 'PYEOF'
          import json, os
          settings = {
            "env": {
              "ANTHROPIC_BASE_URL": "https://api.minimax.io/anthropic",
              "ANTHROPIC_AUTH_TOKEN": os.environ["MINIMAX_API_KEY"],
              "API_TIMEOUT_MS": "3000000",
              "ANTHROPIC_SMALL_FAST_MODEL": "MiniMax-M2.7",
              "ANTHROPIC_DEFAULT_SONNET_MODEL": "MiniMax-M2.7",
              "ANTHROPIC_DEFAULT_HAIKU_MODEL": "MiniMax-M2.7",
              "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": "1"
            },
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": os.environ["GH_TOKEN"]
                }
              }
            }
          }
          with open(os.path.expanduser("~/.claude/settings.json"), "w") as f:
            json.dump(settings, f, indent=2)
          PYEOF

      - name: Build agent prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          T_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
          T_TITLE: ${{ github.event.pull_request.title || github.event.issue.title }}
          T_BODY: ${{ github.event.pull_request.body || github.event.issue.body }}
          C_BODY: ${{ github.event.comment.body || github.event.review.body }}
          C_PATH: ${{ github.event.comment.path }}
          # Improved PR detection logic
          IS_PR: ${{ github.event.issue.pull_request != null || github.event.pull_request != null }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          python3 - << 'PYEOF'
          import os

          def e(key):
              return os.environ.get(key, "")

          event = e("EVENT_NAME")
          repo  = e("REPO")
          is_pr = e("IS_PR").lower() == "true"
          t_id  = e("T_NUMBER")
          branch = e("BRANCH_NAME")
  
          GITHUB_RULE = (
              "IMPORTANT: For ALL GitHub operations (posting comments, creating PRs, etc.) "
              "you MUST use the mcp__github__* tools. Never use gh CLI or curl for GitHub API calls.\n\n"
          )
          
          PR_INSTRUCTIONS = (
            f"Instructions:\n"
            f"1. Read CLAUDE.md and AGENTS.md.\n"
            f"2. Read IMPLEMENTATION_PLAN.md.\n"
            f"3. IMPORTANT: Do not open another PR or branch, this branch is for you to make the updates in.\n"
            f"4. CRITICAL git discipline: after every single file you create or modify, immediately run `git add <file> && git commit -m '<message>'`. ONE file = ONE commit. Never batch multiple files.\n"
            f"5. After every 3 commits, run `git push`.\n"
            f"6. To push, ALWAYS use: `git push origin HEAD:{branch}`\n"
            f"7. If you are about to run out of turns, stop implementing, commit and push everything completed so far, then stop.\n"
            f"8. After pushing all commits, post a comment on PR #{e('T_NUMBER')} in repo {repo} using mcp__github__create_issue_comment summarizing what was implemented, which files were changed, and the branch name.\n\n"
          )

          if event == "issue_comment":
              if is_pr:
                prompt = GITHUB_RULE + (
                    f"** This is a Github PR **\n\n"
                    f"Repository: {repo}\n"
                    f"Branch: {branch}\n"
                    f"PR #{e('T_NUMBER')}: {e('T_TITLE')}\n"
                    f"PR description:\n{e('T_BODY')}\n\n"                    
                ) + PR_INSTRUCTIONS + f"User Instructions:\n{e('C_BODY')}\n\n"                 
              else:
                prompt = GITHUB_RULE + (
                    f"** This is a Github Issue **\n\n"
                    f"Repository: {repo}\n"
                    f"Issue #{e('T_NUMBER')}: {e('T_TITLE')}\n"
                    f"Issue body:\n{e('T_BODY')}\n\n"
                    f"User comment:\n{e('C_BODY')}\n\n"
                    f"Instructions:\n"
                    f"1. Read CLAUDE.md and AGENTS.md.\n"
                    f"2. Analyze the issue and create a branch for the fix.\n"
                    f"3. Write an IMPLEMENTATION_PLAN.md describing your approach.\n"
                    f"4. Commit and push IMPLEMENTATION_PLAN.md to the branch.\n"
                    f"5. Open a draft PR using mcp__github__create_pull_request with the plan in the description and '@minmax' in the PR body.\n"
                    f"6. Do NOT implement anything yet — plan only.\n"
                    f"7. Post a comment on issue #{e('T_NUMBER')} in repo {repo} using mcp__github__create_issue_comment with a summary and a link to the PR."
                )
          elif event == "pull_request_review_comment":
              prompt = GITHUB_RULE + (
                  f"** This is a Github PR **\n\n"
                  f"Repository: {repo}\n"
                  f"Branch: {branch}\n"
                  f"PR #{e('T_NUMBER')}: {e('T_TITLE')}\n"
                  f"PR description:\n{e('T_BODY')}\n\n" 
              ) + PR_INSTRUCTIONS + f"Review comment on {e('C_PATH')}:\n{e('C_BODY')}\n\n"              
          elif event == "pull_request_review":
              prompt = GITHUB_RULE + (
                  f"** This is a Github PR **\n\n"
                  f"Repository: {repo}\n"
                  f"Branch: {branch}\n"
                  f"PR #{e('T_NUMBER')}: {e('T_TITLE')}\n"
                  f"PR description:\n{e('T_BODY')}\n\n"
              ) + PR_INSTRUCTIONS + f"PR review:\n{e('REVIEW_BODY')}\n\n"              
          elif event == "pull_request":
              prompt = GITHUB_RULE + (
                  f"** This is a Github PR **\n\n"
                  f"Repository: {repo}\n"
                  f"Branch: {branch}\n"
                  f"PR #{e('T_NUMBER')}: {e('T_TITLE')}\n"
                  f"PR description:\n{e('T_BODY')}\n\n"
              ) + PR_INSTRUCTIONS + f"Implement the PR\n\n"              
          else:
              prompt = ""

          with open("/tmp/agent_prompt.txt", "w") as f:
              f.write(prompt)
          print(f"Prompt written ({len(prompt)} chars)")
          PYEOF

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          T_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
        run: |
          gh issue comment "$T_NUMBER" --repo "$REPO" --body "MiniMax is starting to work on this..."

      - name: Run MiniMax agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT=$(cat /tmp/agent_prompt.txt)
          claude \
            --model MiniMax-M2.7 \
            --max-turns 200 \
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,LS,Bash(git:*),Bash(find:*),Bash(gh:*),mcp__github__create_pull_request,mcp__github__list_pull_requests,mcp__github__get_pull_request,mcp__github__update_pull_request,mcp__github__create_issue_comment" \
            -p "$PROMPT" | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Safety net — commit and push any uncommitted changes
        if: always()
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: commit remaining changes from minmax session"
          git push origin HEAD:${{ github.head_ref || github.ref_name }} || true

      - name: Upload Claude Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-logs-${{ github.run_id }}
          # Use the absolute path or $HOME instead of ~
          path: /home/runner/.claude/logs/
          # OR if you are on a custom local user:
          # path: /root/.claude/logs/
          retention-days: 7