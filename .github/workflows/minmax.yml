name: MiniMax Code Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]

jobs:
  minmax:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@minmax')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@minmax')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@minmax')) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@minmax') || github.event.pull_request.user.login == 'minmax[bot]'))
    runs-on: self-hosted-minmax
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Configure git identity
        run: |
          git config user.email "minmax-agent@github-actions"
          git config user.name "MiniMax Agent"

      - name: Clear Claude state
        run: rm -rf ~/.claude/plugins ~/.claude/settings.json
        continue-on-error: true

      - name: Configure Claude Code for MiniMax
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.claude
          python3 - << 'PYEOF'
          import json, os
          settings = {
            "env": {
              "ANTHROPIC_BASE_URL": "https://api.minimax.io/anthropic",
              "ANTHROPIC_AUTH_TOKEN": os.environ["MINIMAX_API_KEY"],
              "API_TIMEOUT_MS": "3000000",
              "ANTHROPIC_SMALL_FAST_MODEL": "MiniMax-M2.7",
              "ANTHROPIC_DEFAULT_SONNET_MODEL": "MiniMax-M2.7",
              "ANTHROPIC_DEFAULT_HAIKU_MODEL": "MiniMax-M2.7",
              "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": "1"
            },
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": os.environ["GH_TOKEN"]
                }
              }
            }
          }
          with open(os.path.expanduser("~/.claude/settings.json"), "w") as f:
            json.dump(settings, f, indent=2)
          PYEOF

      - name: Build agent prompt
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          REVIEW_BODY: ${{ github.event.review.body }}
          COMMENT_PATH: ${{ github.event.comment.path }}
        run: |
          python3 - << 'PYEOF'
          import os

          event = os.environ.get("EVENT_NAME", "")
          repo  = os.environ.get("REPO", "")

          def e(key):
              return os.environ.get(key, "")

          if event == "issue_comment":
              prompt = (
                  f"Repository: {repo}\n"
                  f"Issue #{e('ISSUE_NUMBER')}: {e('ISSUE_TITLE')}\n"
                  f"Issue body:\n{e('ISSUE_BODY')}\n\n"
                  f"User comment:\n{e('COMMENT_BODY')}\n\n"
                  f"After completing the task, post a comment on issue #{e('ISSUE_NUMBER')} in repo {repo} "
                  f"using mcp__github__create_issue_comment summarizing what was done and linking any PR created."
              )
          elif event == "pull_request_review_comment":
              prompt = (
                  f"Repository: {repo}\n"
                  f"PR #{e('PR_NUMBER')}: {e('PR_TITLE')}\n"
                  f"PR description:\n{e('PR_BODY')}\n\n"
                  f"Review comment on {e('COMMENT_PATH')}:\n{e('COMMENT_BODY')}\n\n"
                  f"After completing the task, post a comment on PR #{e('PR_NUMBER')} in repo {repo} "
                  f"using mcp__github__create_issue_comment summarizing what was done and which files were changed."
              )
          elif event == "pull_request_review":
              prompt = (
                  f"Repository: {repo}\n"
                  f"PR #{e('PR_NUMBER')}: {e('PR_TITLE')}\n"
                  f"PR description:\n{e('PR_BODY')}\n\n"
                  f"PR review:\n{e('REVIEW_BODY')}\n\n"
                  f"After completing the task, post a comment on PR #{e('PR_NUMBER')} in repo {repo} "
                  f"using mcp__github__create_issue_comment summarizing what was done and which files were changed."
              )
          elif event == "pull_request":
              prompt = (
                  "Implement the plan described in the PR description. "
                  "Follow the instructions in CLAUDE.md. "
                  "CRITICAL: after every single file you create or modify, "
                  "immediately run git add and git commit for that file before touching anything else.\n\n"
                  f"Repository: {repo}\n"
                  f"PR #{e('PR_NUMBER')}: {e('PR_TITLE')}\n"
                  f"PR description:\n{e('PR_BODY')}\n\n"
                  f"After pushing all commits, post a comment on PR #{e('PR_NUMBER')} in repo {repo} "
                  f"using mcp__github__create_issue_comment summarizing what was implemented, "
                  f"which files were changed, and the branch name."
              )
          else:
              prompt = ""

          with open("/tmp/agent_prompt.txt", "w") as f:
              f.write(prompt)
          print(f"Prompt written ({len(prompt)} chars)")
          PYEOF

      - name: Post starting comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "$EVENT_NAME" = "issue_comment" ]; then
            NUMBER="$ISSUE_NUMBER"
          else
            NUMBER="$PR_NUMBER"
          fi
          gh issue comment "$NUMBER" --repo "$REPO" --body "MiniMax is starting to work on this..."

      - name: Run MiniMax agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROMPT=$(cat /tmp/agent_prompt.txt)
          claude \
            --model MiniMax-M2.7 \
            --max-turns 200 \
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,LS,Bash(git:*),Bash(find:*),mcp__github__create_pull_request,mcp__github__list_pull_requests,mcp__github__get_pull_request,mcp__github__update_pull_request,mcp__github__create_issue_comment" \
            -p "$PROMPT"

      - name: Safety net — commit and push any uncommitted changes
        if: always()
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: commit remaining changes from minmax session"
          git push || true
