name: Claude Code Agent
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [opened]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'pull_request' && (contains(github.event.pull_request.body, '@claude') || github.event.pull_request.user.login == 'claude[bot]'))
    runs-on: self-hosted
    timeout-minutes: 120
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Clear Claude state
        run: rm -rf ~/.claude/plugins ~/.claude/settings.json
        continue-on-error: true

      - name: Set prompt for PR implementation
        if: github.event_name == 'pull_request'
        run: |
          echo "CLAUDE_PROMPT=Implement the plan described in the PR description. Follow the instructions in CLAUDE.md. CRITICAL: after every single file you create or modify, immediately run git add and git commit for that file before touching anything else." >> $GITHUB_ENV

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: ${{ env.CLAUDE_PROMPT }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 200
            --allowedTools "Read,Write,Edit,MultiEdit,Glob,Grep,LS,Bash(git:*),Bash(find:*),mcp__github__create_pull_request,mcp__github__list_pull_requests,mcp__github__get_pull_request,mcp__github__update_pull_request"

      - name: Safety net — commit and push any uncommitted changes
        if: always()
        run: |
          git add -A
          git diff --cached --quiet || git commit -m "chore: commit remaining changes from claude session"
          git push || true
